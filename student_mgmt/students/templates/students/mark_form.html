<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% if edit %}Edit Mark{% else %}Add Mark{% endif %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header {% if edit %}bg-warning{% else %}bg-success{% endif %} text-white">
          <h4 class="mb-0">
            {% if edit %}Edit Mark for {{ student.name }}{% else %}Add Mark for {{ student.name }}{% endif %}
          </h4>
        </div>
        <div class="card-body">
          <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
              {% endif %}
            </div>
            {% endfor %}
            <div class="d-flex justify-content-between">
              <a href="{% url 'student_detail' student.pk %}" class="btn btn-secondary">Cancel</a>
              <button type="submit" class="btn {% if edit %}btn-warning{% else %}btn-success{% endif %}">
                {% if edit %}Update Mark{% else %}Save Mark{% endif %}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
