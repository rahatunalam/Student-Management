<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Mark</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-danger shadow-sm">
        <div class="card-header bg-danger text-white">
          <h4 class="mb-0">Confirm Delete Mark</h4>
        </div>
        <div class="card-body text-center">
          <p class="fs-5">Are you sure you want to delete this mark?</p>
          <p class="fw-bold fs-4">{{ mark.subject }} - {{ mark.score }}</p>
          <p class="text-muted">Student: {{ mark.student.name }}</p>
          <form method="POST">
            {% csrf_token %}
            <a href="{% url 'student_detail' mark.student.pk %}" class="btn btn-secondary me-3">Cancel</a>
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
