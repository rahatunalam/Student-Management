<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white text-center">
          <h4 class="mb-0">Student Management Login</h4>
        </div>
        <div class="card-body p-4">

          <!-- Show Django messages (errors, success) -->
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}

          <form method="POST">
            {% csrf_token %}
            <!-- csrf_token is a hidden security field Django requires on every
                 POST form. It prevents Cross-Site Request Forgery attacks where
                 another website tricks your browser into submitting a form. -->

            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input type="text" name="username" class="form-control" 
                     placeholder="Enter username" required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" 
                     placeholder="Enter password" required>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-dark btn-lg">Login</button>
            </div>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
